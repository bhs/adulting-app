services:
  # Web Service - Next.js Application
  - type: web
    name: adulting-app
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: adulting-app-db
          property: connectionString
    buildCommand: npm run build
    startCommand: npm start
    autoDeploy: true

databases:
  # PostgreSQL Database
  - name: adulting-app-db
    plan: free
    databaseName: adulting_app
    user: adulting_app_user
    region: oregon
