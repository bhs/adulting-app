# Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'adulting-app-local'
    environment: 'development'

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape OpenTelemetry Collector metrics endpoint
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: ['otel-collector:8888', 'otel-collector:8889']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'otel-collector'

  # Scrape application metrics (if app exposes /metrics endpoint)
  - job_name: 'adulting-app'
    scrape_interval: 10s
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'
    scrape_timeout: 5s

# Remote write configuration (already handled by OTel Collector)
# This allows the collector to write metrics to Prometheus
remote_write:
  - url: http://localhost:9090/api/v1/write
    queue_config:
      capacity: 10000
      max_shards: 5
      min_shards: 1
      max_samples_per_send: 5000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 100ms
