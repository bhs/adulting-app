{{ define "user-row.html" }}
<tr id="user-{{ .ID }}">
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ .ID }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ .Name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ .Email }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
        <button hx-delete="/api/users/{{ .ID }}" hx-target="#user-{{ .ID }}" hx-swap="outerHTML swap:1s" hx-confirm="Are you sure you want to delete this user?" class="text-red-600 hover:text-red-900">
            Delete
        </button>
    </td>
</tr>
{{ end }}
